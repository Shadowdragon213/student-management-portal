<!DOCTYPE html>
<html>
<head>

  <script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>

        .content {
  text-align: center;
}

#output {
  display: flex;
  flex-direction: column;
  align-items: center;
}

        #bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
    object-fit: cover;
    opacity: 0.3;
}

button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 20px;
  transition: 0.3s;
}

button:hover {
  box-shadow: 0 0 15px #2563eb;
  transform: scale(1.05);
}

h1 {
  text-shadow: 0 0 10px #2563eb;
}

.form-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px 0;
}

        .navbar button:hover {
    background: #2563eb;
    box-shadow: 0 0 10px #2563eb;
}

button {
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #2563eb;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin: 5px;
   width: 90%;
   max-width: 200px;
}
        .navbar button {
    background: transparent;
    color: white;
    border: none;
    margin-left: 15px;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 5px;
    transition: 0.3s;
}

.navbar button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #2563eb;
}

      body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.content {
    text-align: center;
    padding: 50px;
}

input {
    padding: 10px;
    width: 90%;
    max-width: 300px;
    margin: 8px;
    border-radius: 5px;
    border: none;
}
input:focus {
  outline: none;
  box-shadow: 0 0 10px #2563eb;
  transform: scale(1.02);
  transition: 0.2s;
}

#msg {
  transition: all 0.3s ease;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 6px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 15px #2563eb;
}

button:active {
  transform: scale(0.97);
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
  flex-wrap: wrap;
}

.card {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s ease forwards;
}

.card:hover {
  transform: scale(1.03);
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

#output {
  margin-top: 30px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
  width: 60%;
  margin-left: auto;
  margin-right: auto;

  display: flex;
  flex-direction: column;
  align-items: center;
}
@media (max-width: 600px) {
  #output {
    flex-direction: column;
    align-items: center;
  }

  input, button {
    width: 90%;
  }
}
 

    </style>
</head>
<body>
    <video autoplay muted loop id="bgVideo">
    <source src="background.mp4.mp4" type="video/mp4">
</video>

<div class="content">
    <h1>Student Dashboard</h1>

   <div class="form-row">
  <input id="id" placeholder="ID">
  <input id="name" placeholder="Name">
</div>

<div class="form-row">
  <input id="age" placeholder="Age">
  <input id="course" placeholder="Course">
</div>

<div class="form-row">
  <input type="number" id="marks" placeholder="Enter Marks">
  <input type="text" id="grade" placeholder="Enter Grade (A/B/C)">
</div>
<div id="msg" style="
  text-align:center;
  margin-top:10px;
  font-weight:bold;
"></div>

<input id="search" placeholder="Search by name..." oninput="searchStudent()" />


<div class="btn-group">

  <button onclick="addStudent()">Add Student</button>
  <button onclick="viewStudents()">View Students</button>
  <button onclick="deleteStudent()">Delete Student</button>
  <button onclick="updateStudent()">Update Student</button>
  <button onclick="loadStudentById()">Load Student</button>
  <button onclick="logout()">Logout</button>
</div>

    <div id="output" style="margin-top:20px;"></div>
</div>
<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

<script src = "app.js"></script>

</body>
</html>
