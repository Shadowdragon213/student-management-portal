<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

/* 🌌 BODY */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top left, #1e293b, #0f172a);
  color: white;
}

/* 🎥 VIDEO */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.22; 
  z-index: -2;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(59,130,246,0.15), rgba(0,0,0,0.6));
  z-index: -1;
}

/* 📦 CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

/* 🌟 HEADER */
.header h1 {
  font-size: 42px;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.header p {
  opacity: 0.7;
  margin-bottom: 40px;
  font-size: 16px;
}

/* 💎 GLASS FORM */
.form-box {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 35px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

/* 🧾 FORM ROW */
.form-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 12px 0;
}

/* INPUT */
input {
  padding: 14px;
  border-radius: 10px;
  border: none;
  width: 100%;
  max-width: 320px;
  background: rgba(255,255,255,0.08);
  color: white;
}

input::placeholder {
  color: #cbd5f5;
}

input:focus {
  outline: none;
  box-shadow: 0 0 12px #2563eb;
  transform: scale(1.02);
}

/* 🔘 BUTTONS */
button {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: 500;
}

/* HOVER */
button:hover {
  transform: translateY(-2px) scale(1.05);
  box-shadow: 0 0 20px #2563eb;
}

/* BUTTON GROUP */
.btn-group {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-top: 25px;
  flex-wrap: wrap;
}

/* ✨ FOOT */
.footer-text {
  margin-top: 35px;
  opacity: 0.5;
  font-size: 14px;
}

</style>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="background.mp4.mp4" type="video/mp4">
</video>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>Student Dashboard</h1>
    <p>Manage student records efficiently — add, update, delete and view all data in one place.</p>
  </div>

  <!-- FORM -->
  <div class="form-box">

    <div class="form-row">
      <input id="id" placeholder="Student ID">
      <input id="name" placeholder="Student Name">
    </div>

    <div class="form-row">
      <input id="age" placeholder="Age">
      <input id="course" placeholder="Course">
    </div>

    <div class="form-row">
      <input type="number" id="marks" placeholder="Marks">
      <input id="grade" placeholder="Grade (A/B/C)">
    </div>

    <div class="form-row">
      <input id="search" placeholder="Search by name..." oninput="searchStudent()">
    </div>

    <div class="btn-group">
      <button onclick="addStudent()">Add</button>
      <button onclick="goToView()">View</button>
      <button onclick="deleteStudent()">Delete</button>
      <button onclick="updateStudent()">Update</button>
      <button onclick="logout()">Logout</button>
    </div>

  </div>

  <p class="footer-text">Student Management Portal • Final Year Project</p>

</div>

<script src="app.js"></script>

</body>
</html>
