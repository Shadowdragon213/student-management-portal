<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>

        .content {
  text-align: center;
}

#output {
  display: flex;
  flex-direction: column;
  align-items: center;
}

        #bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
    object-fit: cover;
    opacity: 0.3;
}

        .navbar button:hover {
    background: #2563eb;
    box-shadow: 0 0 10px #2563eb;
}

button {
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #2563eb;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin: 5px;
  width: 250px;
}
        .navbar button {
    background: transparent;
    color: white;
    border: none;
    margin-left: 15px;
    font-size: 16px;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 5px;
    transition: 0.3s;
}

.navbar button:hover {
    background: #2563eb;
    color: white;
}

      body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.content {
    text-align: center;
    padding: 50px;
}

input {
    padding: 10px;
    width: 250px;
    margin: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    background-color: #2563eb;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #1d4ed8;
}

#output {
  margin-top: 30px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
  width: 60%;
  margin-left: auto;
  margin-right: auto;

  display: flex;
  flex-direction: column;
  align-items: center;
}
 

    </style>
</head>
<body>
    <video autoplay muted loop id="bgVideo">
    <source src="BG3.mp4" type="video/mp4">
</video>

<div class="content">
    <h1>Student Dashboard</h1>

    <input id="id" placeholder="ID" onblur="loadStudentById()">
    <input id="name" placeholder="Name"><br><br>
    <input id="age" placeholder="Age"><br><br>
    <input id="course" placeholder="Course"><br><br>
    <input type="number" id="marks" placeholder="Enter Marks" />
<input type="text" id="grade" placeholder="Enter Grade (A/B/C)" />


    <button onclick="addStudent()">Add Student</button>
    <button onclick="viewStudents()">View Students</button>
    <button onclick="deleteStudent()">Delete Student</button>
    <button onclick="updateStudent()">Update Student</button>

    <div id="output" style="margin-top:20px;"></div>
</div>
<script src="app.js"></script>

</body>
</html>
