<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
/* 🌌 BODY */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* 🎥 BACKGROUND VIDEO */
#bgVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  opacity: 0.15;
  z-index: -1;
}

/* 📦 CONTENT */
.content {
  text-align: center;
  padding: 40px;
}

/* 🧾 FORM */
.form-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px 0;
}

input {
  padding: 10px;
  border-radius: 6px;
  border: none;
  width: 90%;
  max-width: 250px;
}

/* 🔘 BUTTONS */
button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #2563eb;
}

.btn-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 15px;
  flex-wrap: wrap;
}

/* ⭐ SECTION TITLE */
.section-title {
  margin-top: 50px;
  font-size: 24px;
  font-weight: bold;
}

/* 🔥 GRID (MAIN STAR) */
#output {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: 40px auto;
  padding: 20px;
}

/* 💎 CARD */
.card {
  background: linear-gradient(145deg, #1e293b, #0f172a);
  border-radius: 22px;
  padding: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.04);
}

/* 🔹 CARD HEADER */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.student-name {
  font-size: 26px;
  font-weight: bold;
}

.student-grade {
  background: #22c55e;
  padding: 6px 14px;
  border-radius: 12px;
  font-weight: bold;
  font-size: 14px;
}

/* 📄 CARD BODY */
.card-body p {
  margin: 8px 0;
  font-size: 16px;
}

/* 🔘 CARD BUTTON */
.card-actions {
  text-align: center;
  margin-top: 20px;
}

.card-actions button {
  background: #3b82f6;
  padding: 12px 20px;
  border-radius: 10px;
}

.card-actions button:hover {
  background: #2563eb;
}

</style>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="background.mp4.mp4" type="video/mp4">
</video>

<div class="content">
<h1>Student Dashboard</h1>

<div class="form-row">
  <input id="id" placeholder="ID">
  <input id="name" placeholder="Name">
</div>

<div class="form-row">
  <input id="age" placeholder="Age">
  <input id="course" placeholder="Course">
</div>

<div class="form-row">
  <input type="number" id="marks" placeholder="Marks">
  <input id="grade" placeholder="Grade">
</div>

<input id="search" placeholder="Search by name..." oninput="searchStudent()" />

<div class="btn-group">
  <button onclick="addStudent()">Add</button>
  <button onclick="viewStudents()">View</button>
  <button onclick="deleteStudent()">Delete</button>
  <button onclick="updateStudent()">Update</button>
  <button onclick="logout()">Logout</button>
</div>
<h2 class="section-title">Students</h2>
<div id="output"></div>

</div>

<script src="app.js"></script>

</body>
</html>
