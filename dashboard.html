<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

/* 🌌 BODY */
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* 🎥 BACKGROUND VIDEO */
#bgVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  opacity: 0.12;
  z-index: -1;
}

/* 📦 CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* 🌟 HEADER */
.header h1 {
  font-size: 38px;
  margin-bottom: 10px;
}

.header p {
  opacity: 0.7;
  margin-bottom: 30px;
}

/* 💎 FORM CARD */
.form-box {
  background: linear-gradient(145deg, #1e293b, #0f172a);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

/* 🧾 FORM ROW */
.form-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 10px 0;
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 100%;
  max-width: 300px;
}

/* 🔘 BUTTONS */
button {
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 22px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.06);
  box-shadow: 0 0 12px #2563eb;
}

/* BUTTON GROUP */
.btn-group {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 20px;
  flex-wrap: wrap;
}

/* ✨ FOOT TEXT */
.footer-text {
  margin-top: 30px;
  opacity: 0.6;
  font-size: 14px;
}

</style>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
  alert("Please login first!");
  window.location.href = "login.html";
}
</script>

</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="background.mp4.mp4" type="video/mp4">
</video>

<div class="container">

  <!-- 🌟 HEADER -->
  <div class="header">
    <h1>Student Dashboard</h1>
    <p>Manage student records efficiently — add, update, delete and view all data in one place.</p>
  </div>

  <!-- 💎 FORM -->
  <div class="form-box">

    <div class="form-row">
      <input id="id" placeholder="Student ID">
      <input id="name" placeholder="Student Name">
    </div>

    <div class="form-row">
      <input id="age" placeholder="Age">
      <input id="course" placeholder="Course">
    </div>

    <div class="form-row">
      <input type="number" id="marks" placeholder="Marks">
      <input id="grade" placeholder="Grade (A/B/C)">
    </div>

    <div class="form-row">
      <input id="search" placeholder="Search by name..." oninput="searchStudent()">
    </div>

    <div class="btn-group">
      <button onclick="addStudent()">Add</button>
      <button onclick="goToView()">View</button>
      <button onclick="deleteStudent()">Delete</button>
      <button onclick="updateStudent()">Update</button>
      <button onclick="logout()">Logout</button>
    </div>

  </div>

  <!-- ✨ FOOT -->
  <p class="footer-text">Student Management Portal </p>

</div>

<script src="app.js"></script>

</body>
</html>
