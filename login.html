<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Portal</title>
    <style>

        #bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    z-index: -1;
    object-fit: cover;
    opacity: 0.3;
}
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <video autoplay muted loop id="bgVideo">
    <source src="BG2.mp4" type="video/mp4">
</video>

<div class="login-box">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const response = await fetch("https://student-management-portal-backendstucture.onrender.com/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const result = await response.text();

  if (result === "success") {
    alert("Login Successful!");
    window.location.href = "dashboard.html";
  } else {
    alert("Invalid Credentials");
  }
}
</script>
</body>
</html>
